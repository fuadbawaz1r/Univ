<!DOCTYPE html>
<html>
<head>
    <title>Soal-5 Kalkulator Sederhana</title>

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <script src="script.js" defer></script>
</head>
<body>

    <div class="container mt-5">
        <h1 class="mb-4">Soal-5 Kalkulator Sederhana</h1>

        <div class="card p-4">
            <div class="mb-3">
                <label class="form-label">Angka Pertama</label>
                <input type="number" id="angka1" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Angka Kedua</label>
                <input type="number" id="angka2" class="form-control">
            </div>

            <div class="mb-3">
                <button class="btn btn-primary" onclick="hitung('+')">+</button>
                <button class="btn btn-success" onclick="hitung('-')">-</button>
                <button class="btn btn-warning" onclick="hitung('*')">×</button>
                <button class="btn btn-danger" onclick="hitung('/')">÷</button>
            </div>

            <h4>Hasil: <span id="hasil">0</span></h4>
        </div>
    </div>

</body>
</html>
