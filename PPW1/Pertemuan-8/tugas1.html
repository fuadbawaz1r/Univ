<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulir Pendaftaran Mahasiswa Baru</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style2.css"/>
</head>
<body>

  <div class="form-card">
    <h4>📋 Formulir Pendaftaran Mahasiswa Baru</h4>

    <!-- Alert Sukses (default: tersembunyi) -->
    <div id="alertSukses" class="alert alert-success alert-dismissible fade show d-none" role="alert">
      ✅ Data berhasil disimpan!
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form id="formDaftar" novalidate>

      <!-- Baris 2 kolom: Nama & NIM -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="nama" class="form-control" placeholder="Masukkan nama lengkap" required/>
          <div class="valid-feedback">Nama valid.</div>
          <div class="invalid-feedback">Nama tidak boleh kosong.</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">NIM</label>
          <input type="text" id="nim" class="form-control" placeholder="Contoh: 2024010001" required pattern="\d{10}"/>
          <div class="valid-feedback">NIM valid.</div>
          <div class="invalid-feedback">NIM harus 10 digit angka.</div>
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="contoh@email.com"/>
      </div>

      <!-- Program Studi -->
      <div class="mb-3">
        <label class="form-label">Program Studi</label>
        <select id="prodi" class="form-select">
          <option value="" disabled selected>-- Pilih Program Studi --</option>
          <option>Teknik Informatika</option>
          <option>Sistem Informasi</option>
          <option>Ilmu Komputer</option>
          <option>Teknik Elektro</option>
        </select>
      </div>

      <!-- Semester -->
      <div class="mb-3">
        <label class="form-label">Semester</label>
        <select id="semester" class="form-select">
          <option value="" disabled selected>-- Pilih Semester --</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
          <option>6</option>
          <option>7</option>
          <option>8</option>
        </select>
      </div>

      <!-- Alamat -->
      <div class="mb-3">
        <label class="form-label">Alamat</label>
        <textarea id="alamat" class="form-control" rows="3" placeholder="Masukkan alamat lengkap"></textarea>
      </div>

      <!-- Foto Profil -->
      <div class="mb-4">
        <label class="form-label">Foto Profil</label>
        <input type="file" id="foto" class="form-control" accept="image/*"/>
      </div>

      <!-- Tombol Simpan & Reset -->
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-primary" onclick="simpanData()">Simpan</button>
        <button type="reset" class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>

    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function simpanData() {
      const nama = document.getElementById('nama');
      const nim  = document.getElementById('nim');

      // Validasi Nama
      if (nama.value.trim() === '') {
        nama.classList.remove('is-valid');
        nama.classList.add('is-invalid');
      } else {
        nama.classList.remove('is-invalid');
        nama.classList.add('is-valid');
      }

      // Validasi NIM (10 digit angka)
      const nimPattern = /^\d{10}$/;
      if (!nimPattern.test(nim.value.trim())) {
        nim.classList.remove('is-valid');
        nim.classList.add('is-invalid');
      } else {
        nim.classList.remove('is-invalid');
        nim.classList.add('is-valid');
      }

      // Tampilkan alert sukses hanya jika keduanya valid
      const alert = document.getElementById('alertSukses');
      if (nama.classList.contains('is-valid') && nim.classList.contains('is-valid')) {
        alert.classList.remove('d-none');
      } else {
        alert.classList.add('d-none');
      }
    }

    function resetForm() {
      // Hapus semua class validasi saat reset
      document.querySelectorAll('.is-valid, .is-invalid').forEach(el => {
        el.classList.remove('is-valid', 'is-invalid');
      });
      document.getElementById('alertSukses').classList.add('d-none');
    }
  </script>

</body>
</html>
