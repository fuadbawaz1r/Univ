<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Nilai Mahasiswa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style3.css"/>
</head>
<body>

<div class="container py-4">

  <!-- Profile Card -->
  <div class="profile-card">
    <img src="https://i.pravatar.cc/150?img=12" alt="Foto Profil"/>
    <div>
      <h5>Budi Santoso</h5>
      <div class="text-muted" style="font-size:0.9rem;">NIM: 2024010001 &nbsp;|&nbsp; Teknik Informatika</div>
      <span class="badge bg-success mt-1">Aktif</span>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="row g-3">
    <div class="col-md-4">
      <div class="stat-card">
        <div class="icon">📚</div>
        <div class="value">72</div>
        <div class="label">Total SKS</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div class="icon">🏆</div>
        <div class="value">3.72</div>
        <div class="label">IPK</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div class="icon">✅</div>
        <div class="value">18</div>
        <div class="label">Mata Kuliah Lulus</div>
      </div>
    </div>
  </div>

  <!-- Tabel Nilai -->
  <div class="table-card">
    <h6>Daftar Nilai</h6>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>No</th>
            <th>Mata Kuliah</th>
            <th>SKS</th>
            <th>Nilai Huruf</th>
            <th>Nilai Angka</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data akan di-generate oleh JS -->
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Modal Detail -->
<div class="modal fade" id="modalDetail" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Detail Mata Kuliah</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Isi dari JS -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const mataKuliah = [
    { nama: "Algoritma & Pemrograman",    sks: 4, huruf: "A",  angka: 4.0, dosen: "Dr. Andi",    semester: 1, ket: "Lulus dengan baik" },
    { nama: "Matematika Diskrit",          sks: 3, huruf: "A+", angka: 4.0, dosen: "Dr. Budi",    semester: 1, ket: "Nilai terbaik kelas" },
    { nama: "Basis Data",                  sks: 4, huruf: "B",  angka: 3.0, dosen: "Dr. Citra",   semester: 2, ket: "Perlu perbaikan UAS" },
    { nama: "Jaringan Komputer",           sks: 3, huruf: "B",  angka: 3.0, dosen: "Dr. Dian",    semester: 2, ket: "Konsisten di ujian" },
    { nama: "Pemrograman Web",             sks: 3, huruf: "A",  angka: 4.0, dosen: "Dr. Eka",     semester: 3, ket: "Proyek akhir bagus" },
    { nama: "Rekayasa Perangkat Lunak",    sks: 3, huruf: "C",  angka: 2.0, dosen: "Dr. Fajar",   semester: 3, ket: "Perlu remedial" },
    { nama: "Kecerdasan Buatan",           sks: 3, huruf: "A",  angka: 4.0, dosen: "Dr. Gita",    semester: 4, ket: "Sangat aktif di kelas" },
    { nama: "Sistem Operasi",              sks: 3, huruf: "D",  angka: 1.0, dosen: "Dr. Hendra",  semester: 4, ket: "Tidak lulus, wajib ulang" },
  ];

  function badgeNilai(huruf) {
    if (huruf === 'A' || huruf === 'A+') return `<span class="badge bg-success">${huruf}</span>`;
    if (huruf === 'B')                   return `<span class="badge bg-primary">${huruf}</span>`;
    if (huruf === 'C')                   return `<span class="badge bg-warning text-dark">${huruf}</span>`;
    return `<span class="badge bg-danger">${huruf}</span>`;
  }

  function buatBaris() {
    const tbody = document.querySelector('tbody');
    mataKuliah.forEach((mk, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${mk.nama}</td>
        <td>${mk.sks}</td>
        <td>${badgeNilai(mk.huruf)}</td>
        <td>${mk.angka.toFixed(1)}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary" onclick="bukaModal(${i})">Detail</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function bukaModal(i) {
    const mk = mataKuliah[i];
    document.getElementById('modalBody').innerHTML = `
      <table class="table table-sm">
        <tr><th>Mata Kuliah</th><td>${mk.nama}</td></tr>
        <tr><th>SKS</th><td>${mk.sks}</td></tr>
        <tr><th>Nilai Huruf</th><td>${badgeNilai(mk.huruf)}</td></tr>
        <tr><th>Nilai Angka</th><td>${mk.angka.toFixed(1)}</td></tr>
        <tr><th>Dosen</th><td>${mk.dosen}</td></tr>
        <tr><th>Semester</th><td>${mk.semester}</td></tr>
        <tr><th>Keterangan</th><td>${mk.ket}</td></tr>
      </table>
    `;
    new bootstrap.Modal(document.getElementById('modalDetail')).show();
  }

  buatBaris();
</script>

</body>
</html>
